name: Bug report
description: Something isn't working
labels: [ "bug" ]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: |
        Minimum steps to reproduce. A code snippet or `curl` command is ideal.
      placeholder: |
        1. Build the project with `mvn install`
        2. Run …
        3. Observe …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: JDK version, OS, Couchbase Server / Capella version, S3 provider, library version.
      placeholder: |
        - JDK: Temurin 21.0.4
        - OS: Ubuntu 24.04
        - Couchbase: Server 8.0.1 self-hosted
        - S3: AWS us-east-1
        - cb-blob-store: 0.1.0-SNAPSHOT
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste a redacted log excerpt. Use a fenced code block.
      render: text
