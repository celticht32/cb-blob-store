name: Feature request
description: Suggest an idea or enhancement
labels: [ "enhancement" ]
body:
  - type: textarea
    id: problem
    attributes:
      label: What's the problem you're trying to solve?
      description: Describe the use case, not just the proposed solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: |
        What would you like to see? If you have an API sketch, include it.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you weigh, and why this one?
